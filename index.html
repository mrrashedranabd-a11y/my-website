
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MR Rashed fashion | Checkout</title>
    <style>
        :root { --gold: #d4af37; --black: #0d1117; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--black); color: var(--white); margin: 0; padding: 20px; }
        
        .checkout-container { max-width: 450px; margin: auto; background: #161b22; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #30363d; }
        h2 { text-align: center; margin-bottom: 25px; font-size: 28px; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }
        
        .input-group { margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; font-size: 16px; }
        input:focus { border-color: var(--gold); outline: none; }

        .order-info { background: #0d1117; padding: 15px; border-radius: 8px; margin: 20px 0; border-left: 4px solid var(--gold); text-align: left; }
        .order-info p { margin: 8px 0; font-size: 14px; color: #8b949e; }
        .order-info span { color: var(--white); font-weight: bold; display: block; margin-top: 2px; }

        .btn-group { display: flex; gap: 10px; flex-direction: column; }
        .confirm-btn { background-color: #238636; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .confirm-btn:hover { background-color: #2ea043; }
        
        .wa-btn { background-color: #25D366; color: white; text-decoration: none; text-align: center; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 16px; display: block; box-sizing: border-box; transition: 0.3s; }
        .wa-btn:hover { background-color: #128C7E; }

        .payment-note { font-size: 13px; color: #8b949e; text-align: center; margin-top: 15px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="checkout-container">
    <h2>MR Rashed fashion</h2>
    
    <div class="input-group">
        <input type="text" id="name" placeholder="আপনার নাম" required>
    </div>
    
    <div class="input-group">
        <input type="number" id="phone" placeholder="ফোন নাম্বার" required>
    </div>
    
    <div class="input-group">
        <textarea id="address" placeholder="পূর্ণ ঠিকানা (গ্রাম, থানা, জেলা)" rows="3" required></textarea>
    </div>

    <div class="input-group">
        <select id="paymentMethod">
            <option value="bKash">bKash (বিকাশ)</option>
            <option value="Nagad">Nagad (নগদ)</option>
            <option value="Rocket">Rocket (রকেট)</option>
            <option value="Cash on Delivery">Cash on Delivery (ক্যাশ অন ডেলিভারি)</option>
        </select>
    </div>

    <div class="order-info">
        <p>বিকাশ ও রকেট নাম্বার: <span>01614298617</span></p>
        <p>নগদ নাম্বার: <span>01710392011</span></p>
    </div>

    <div class="btn-group">
        <button class="confirm-btn" onclick="sendOrder()">Confirm Order (অর্ডার করুন)</button>
        <a href="https://wa.me/8801346695273" class="wa-btn">WhatsApp-এ সরাসরি চ্যাট</a>
    </div>

    <p class="payment-note">পেমেন্ট করে "Confirm Order" বাটনে ক্লিক করলে আপনার অর্ডারের সব তথ্য আমাদের হোয়াটসঅ্যাপে চলে আসবে।</p>
</div>

<script>
    function sendOrder() {
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const address = document.getElementById('address').value;
        const payment = document.getElementById('paymentMethod').value;
        const whatsappNumber = "8801346695273"; // আপনার দেওয়া নতুন হোয়াটসঅ্যাপ নাম্বার

        if(name === "" || phone === "" || address === "") {
            alert("অনুগ্রহ করে আপনার নাম, ফোন নাম্বার এবং ঠিকানা দিন।");
            return;
        }

        // হোয়াটসঅ্যাপে যে মেসেজটি আপনার কাছে আসবে সেটির ফরম্যাট
        const message = `*New Order: MR Rashed fashion*%0A%0A` +
                        `*Customer Name:* ${name}%0A` +
                        `*Phone:* ${phone}%0A` +
                        `*Address:* ${address}%0A` +
                        `*Payment Method:* ${payment}%0A%0A` +
                        `আমি এই অর্ডারটি কনফার্ম করতে চাই।`;

        const whatsappURL = `https://wa.me/${whatsappNumber}?text=${message}`;
        window.open(whatsappURL, '_blank');
    }
</script>

</body>
</html>
