<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RASHED FASHION | Luxury Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --gold: #c5a059; --black: #0a0a0a; --white: #ffffff; --grey: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background: var(--grey); color: #333; }
        
        /* Header Section */
        .header {
            background: linear-gradient(145deg, #000, #1a1a1a);
            color: var(--gold);
            text-align: center;
            padding: 40px 20px;
            border-bottom: 2px solid var(--gold);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .brand-name {
            font-family: 'Cinzel', serif;
            font-size: 32px;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin: 0;
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .brand-tagline {
            font-family: 'Playfair Display', serif;
            font-size: 14px;
            font-style: italic;
            color: #888;
            margin-top: 10px;
            letter-spacing: 2px;
        }

        /* Promo Bar */
        .promo { background: #e74c3c; color: white; text-align: center; padding: 8px; font-size: 13px; font-weight: bold; }

        /* Product Grid */
        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; padding-bottom: 100px; }
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }

        .product-card { 
            background: white; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            transition: 0.3s;
            border: 1px solid #eee;
        }
        .product-img { width: 100%; aspect-ratio: 1/1.2; object-fit: cover; }
        
        .info { padding: 15px; text-align: center; }
        .name { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #222; height: 35px; overflow: hidden; }
        .price { font-size: 18px; font-weight: 800; color: var(--black); margin-bottom: 12px; }
        
        /* Button Style */
        .order-btn { 
            background: var(--black); 
            color: var(--gold); 
            border: 1px solid var(--gold); 
            padding: 12px; 
            width: 100%; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase;
            font-size: 12px;
            transition: 0.3s;
        }
        .order-btn:hover { background: var(--gold); color: white; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 12px 0; box-shadow: 0 -2px 15px rgba(0,0,0,0.1); z-index: 1000; }
        .nav-item { color: #555; text-align: center; text-decoration: none; font-size: 11px; }
        .nav-item i { display: block; font-size: 20px; margin-bottom: 3px; }

        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(4, 1fr); } }
    </style>
</head>
<body>

<div class="header">
    <h1 class="brand-name">RASHED FASHION</h1>
    <p class="brand-tagline">Premium Men's Collection</p>
</div>

<div class="promo">৬০% মূল্য ছাড় চলছে***</div>

<div class="container">
    <div class="product-grid">
        
        <div class="product-card">
            <img src="images%20(13).jpeg" class="product-img">
            <div class="info">
                <div class="name">Luxury Navy Blue Shirt</div>
                <div class="price">৳১৪৫০</div>
                <button class="order-btn" onclick="location.href='order.html?item=Shirt-13&price=1450'">Order Now</button>
            </div>
        </div>

        <div class="product-card">
            <img src="images%20(12).jpeg" class="product-img">
            <div class="info">
                <div class="name">Exclusive Black Panjabi</div>
                <div class="price">৳১৯৮০</div>
                <button class="order-btn" onclick="location.href='order.html?item=Panjabi-12&price=1980'">Order Now</button>
            </div>
        </div>

        <div class="product-card">
            <img src="images%20(11).jpeg" class="product-img">
            <div class="info">
                <div class="name">Elegant Green Panjabi</div>
                <div class="price">৳১৮৫০</div>
                <button class="order-btn" onclick="location.href='order.html?item=Panjabi-11&price=1850'">Order Now</button>
            </div>
        </div>

        <div class="product-card">
            <img src="images%20(10).jpeg" class="product-img">
            <div class="info">
                <div class="name">Royal Cotton Panjabi</div>
                <div class="price">৳১৯৯৫</div>
                <button class="order-btn" onclick="location.href='order.html?item=Panjabi-10&price=1995'">Order Now</button>
            </div>
        </div>

    </div>
</div>

<div class="bottom-nav">
    <a href="#" class="nav-item"><i class="fas fa-home"></i>Home</a>
    <a href="https://wa.me/8801346695273" class="nav-item"><i class="fab fa-whatsapp"></i>Order</a>
    <a href="#" class="nav-item"><i class="fas fa-shopping-bag"></i>Store</a>
</div>

</body>
        </html>
