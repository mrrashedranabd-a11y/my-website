<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>RASHED FASHION</title>
    <style>
        body { margin: 0; background-color: #000; color: #fff; font-family: Arial, sans-serif; }
        .header { text-align: center; padding: 20px; border-bottom: 2px solid #c5a059; }
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        .product-card { background: #1a1a1a; padding: 10px; text-align: center; border-radius: 5px; }
        .product-img { width: 100%; }
        .buy-btn { background: #c5a059; padding: 10px; width: 100%; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header"><h1>RASHED FASHION</h1></div>
    <div class="product-grid">
        <div class="product-card">
            <img src="images (13).jpeg" class="product-img">
            <p>Luxury Navy Slim Fit Shirt</p>
            <button class="buy-btn" onclick="alert('অর্ডারের জন্য আমাদের সাথে যোগাযোগ করুন!')">ORDER NOW</button>
        </div>
        <div class="product-card">
            <img src="images (12).jpeg" class="product-img">
            <p>Exclusive Black Panjabi</p>
            <button class="buy-btn" onclick="alert('অর্ডারের জন্য আমাদের সাথে যোগাযোগ করুন!')">ORDER NOW</button>
        </div>
    </div>
</body>
</html>
