<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RASHED FASHION | Premium Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --gold: #c5a059; --dark: #0d0d0d; }
        body { font-family: 'Poppins', sans-serif; margin: 0; padding: 0; background-color: var(--dark); color: #fff; }

        /* --- হোমপেজ স্টাইল (NOBIN Style) --- */
        #home-page { display: block; }
        .header { text-align: center; padding: 40px 20px; border-bottom: 2px solid var(--gold); }
        .brand-name { font-family: 'Cinzel', serif; color: var(--gold); font-size: 28px; letter-spacing: 4px; margin: 0; }
        
        .container { padding: 15px; max-width: 1200px; margin: auto; }
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .product-card { background: #1a1a1a; border-radius: 12px; overflow: hidden; text-align: center; padding-bottom: 15px; border: 1px solid #333; }
        .product-img { width: 100%; aspect-ratio: 1/1.2; object-fit: cover; }
        .p-name { font-size: 13px; color: #ccc; padding: 10px; height: 35px; }
        .p-price { color: var(--gold); font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .buy-btn { background: var(--gold); color: #000; border: none; padding: 10px; width: 90%; font-weight: bold; border-radius: 5px; cursor: pointer; }

        /* --- অর্ডার পেজ স্টাইল (প্রোডাক্ট ছবি ভেসে উঠবে) --- */
        #order-page { display: none; background: #fdfbf7; color: #333; min-height: 100vh; animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .order-header { background: #000; color: var(--gold); padding: 25px; text-align: center; border-bottom: 4px solid var(--gold); }
        .checkout-box { max-width: 500px; margin: auto; padding: 20px; position: relative; }
        
        /* ভাসমান প্রোডাক্ট ইমেজ স্টাইল */
        .order-product-display { 
            width: 150px; 
            height: 150px; 
            object-fit: cover; 
            border-radius: 15px; 
            border: 4px solid var(--gold); 
            margin: -75px auto 15px auto; 
            display: block; 
            background: white; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            position: relative;
            z-index: 10;
        }
        
        .summary-card { 
            background: white; 
            border-radius: 20px; 
            padding: 85px 25px 25px 25px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.05); 
            text-align: center; 
            margin-top: 50px; 
        }
        .summary-card h2 { font-size: 20px; margin: 0; }
        .price-text { font-size: 32px; font-weight: 800; color: var(--gold); margin: 15px 0; }

        .pay-info { background: #fffcf5; border: 1px dashed #c5a059; padding: 20px; border-radius: 15px; margin-top: 20px; text-align: center; }
        .acc-num { display: block; font-size: 19px; font-weight: bold; color: #d63031; margin: 8px 0; }
        
        .whatsapp-btn { background: #25D366; color: white; padding: 18px; border-radius: 50px; display: flex; align-items: center; justify-content: center; text-decoration: none; font-weight: bold; font-size: 18px; margin-top: 25px; }
        .back-btn { background: none; border: none; color: #888; cursor: pointer; margin-top: 20px; text-decoration: underline; font-size: 14px; }
    </style>
</head>
<body>

    <div id="home-page">
        <div class="header">
            <h1 class="brand-name">RASHED FASHION</h1>
        </div>

        <div class="container">
            <div class="product-grid">
                <div class="product-card">
                    <img src="images (13).jpeg" class="product-img">
                    <div class="p-name">Premium Navy Shirt</div>
                    <div class="p-price">৳ ১৪৫০</div>
                    <button class="buy-btn" onclick="openOrder('Premium Navy Shirt', '১৪৫০', 'images (13).jpeg')">অর্ডার করুন</button>
                </div>
                <div class="product-card">
                    <img src="images (12).jpeg" class="product-img">
                    <div class="p-name">Royal Black Panjabi</div>
                    <div class="p-price">৳ ১৯৮০</div>
                    <button class="buy-btn" onclick="openOrder('Royal Black Panjabi', '১৯৮০', 'images (12).jpeg')">অর্ডার করুন</button>
                </div>
                <div class="product-card">
                    <img src="images (11).jpeg" class="product-img">
                    <div class="p-name">Elegant Green Panjabi</div>
                    <div class="p-price">৳ ১৮৫০</div>
                    <button class="buy-btn" onclick="openOrder('Elegant Green Panjabi', '১৮৫০', 'images (11).jpeg')">অর্ডার করুন</button>
                </div>
                <div class="product-card">
                    <img src="images (10).jpeg" class="product-img">
                    <div class="p-name">Golden Cotton Panjabi</div>
                    <div class="p-price">৳ ১৯৯৫</div>
                    <button class="buy-btn" onclick="openOrder('Golden Cotton Panjabi', '১৯৯৫', 'images (10).jpeg')">অর্ডার করুন</button>
                </div>
            </div>
        </div>
    </div>

    <div id="order-page">
        <div class="order-header">
            <h1 style="margin:0; font-family:'Cinzel';">ORDER SUMMARY</h1>
        </div>
        
        <div class="checkout-box">
            <div class="summary-card">
                <img id="dynamic-img" src="" class="order-product-display">
                
                <h2 id="dynamic-name">Product Name</h2>
                <div class="price-text" id="dynamic-price">৳ 0</div>
                <p style="font-size: 12px; color:#999;">ডেলিভারি চার্জ: সারাদেশে ৬০ টাকা</p>
            </div>

            <div class="pay-info">
                <h4 style="margin:0; color:#856404;">পেমেন্ট করুন নিচের নাম্বারে:</h4>
                <span class="acc-num">বিকাশ: 01614298617</span>
                <span class="acc-num">নগদ: 01710392011</span>
            </div>

            <a id="whatsapp-link" href="#" class="whatsapp-btn">
                <i class="fab fa-whatsapp" style="margin-right:10px;"></i> হোয়াটসঅ্যাপে কনফার্ম করুন
            </a>
            
            <center><button class="back-btn" onclick="goHome()">← শপে ফিরে যান</button></center>
        </div>
    </div>

    <script>
        // বাটনে চাপ দিলে প্রোডাক্টের ডাটা নিয়ে অর্ডার পেজ দেখাবে
        function openOrder(productName, productPrice, productImage) {
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('order-page').style.display = 'block';
            
            // ডাটা আপডেট
            document.getElementById('dynamic-name').innerText = productName;
            document.getElementById('dynamic-price').innerText = "৳ " + productPrice;
            document.getElementById('dynamic-img').src = productImage;

            // হোয়াটসঅ্যাপ মেসেজ তৈরি
            const waMsg = `আসসালামু আলাইকুম, আমি আপনার এই প্রোডাক্টটি অর্ডার করতে চাই: \n📦 নাম: ${productName} \n💰 মূল্য: ৳${productPrice} \n\nআমার ঠিকানা ও পেমেন্ট ডিটেইলস নিচে দিচ্ছি।`;
            document.getElementById('whatsapp-link').href = "https://wa.me/8801346695273?text=" + encodeURIComponent(waMsg);
            
            window.scrollTo(0, 0); 
        }

        function goHome() {
            document.getElementById('order-page').style.display = 'none';
            document.getElementById('home-page').style.display = 'block';
        }
    </script>

</body>
</html>
