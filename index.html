<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>RASHED FASHION | Premium Store</title>
    <style>
        /* স্লাইডারের টেক্সট স্টাইল */
        .slide { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            text-align: center; color: #fff; background-size: cover; background-position: center;
            padding: 20px;
        }
        .slide h2 { font-size: 24px; text-shadow: 2px 2px 5px #000; margin: 5px; }
        .slide p { font-size: 16px; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="slider-container">
        <div class="slides" id="slider">
            <div class="slide" style="background-image: url('images (13).jpeg');">
                <h2>OCTOBER SPECIAL</h2>
                <p>প্রতিদিন নতুন পণ্য নিয়ে সবার চেয়ে কম দামে!</p>
            </div>
            <div class="slide" style="background-image: url('images (12).jpeg');">
                <h2>মেগা ডিসকাউন্ট</h2>
                <p>৬০% মূল্য ছাড় চলছে আমাদের সব কালেকশনে!</p>
            </div>
            <div class="slide" style="background-image: url('images (11).jpeg');">
                <h2>প্রিমিয়াম কালেকশন</h2>
                <p>সেরা পাঞ্জাবি এখন আপনার হাতের নাগালে!</p>
            </div>
        </div>
    </div>
    
    <script>
        // স্লাইডারের লজিক আগের মতোই কাজ করবে, শুধু টেক্সটগুলো প্রতিটি স্লাইডে আলাদা ভেসে উঠবে।
    </script>
</body>
</html>
